name: Generate MoshidonQX Keystore (One-Time)

on:
  workflow_dispatch: # 手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Keystore File
        run: |
          # 这里直接为您定制 MoshidonQX 的身份信息
          keytool -genkey -v -keystore moshidonqx.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias qx-alias -storepass qx123456 -keypass qx123456 \
            -dname "CN=QiuXueqi, OU=Dev, O=MoshidonQX, L=Guangzhou, ST=Guangdong, C=CN"
          
          # 将文件转成 Base64 字符串并打印出来，方便您复制
          echo "------------------ START OF BASE64 ------------------"
          base64 -w 0 moshidonqx.jks
          echo -e "\n------------------ END OF BASE64 ------------------"

      - name: Upload Keystore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: moshidonqx-keystore-file
          path: moshidonqx.jks
