name: Generate MoshidonQX Keystore (Dynamic Password)

on:
  workflow_dispatch: # 手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Keystore File
        env:
          # 将 Secret 映射到环境变量，避免日志泄露
          PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          # 邱工，这里现在会直接读取您设置的 "qx123456"
          keytool -genkey -v -keystore moshidonqx.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias qx-alias -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=QiuXueqi, OU=Dev, O=MoshidonQX, L=Guangzhou, ST=Guangdong, C=CN"
          
          # 将文件转成 Base64 字符串打印到日志
          echo "------------------ START OF BASE64 ------------------"
          base64 -w 0 moshidonqx.jks
          echo -e "\n------------------ END OF BASE64 ------------------"

      - name: Upload Keystore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: moshidonqx-keystore-file
          path: moshidonqx.jks
