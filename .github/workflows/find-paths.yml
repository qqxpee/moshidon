name: Find Project File Paths

on:
  workflow_dispatch: # 手动触发，秒级反馈

jobs:
  find-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Locate Critical Files
        run: |
          echo "=== 正在定位 AndroidManifest.xml ==="
          # 从根目录开始递归查找，排除无关的 build 目录
          find . -name "AndroidManifest.xml" -not -path "*/build/*"
          
          echo -e "\n=== 正在定位 strings.xml ==="
          # 查找所有 strings.xml，帮我们确认是否存在多语言或多变体配置
          find . -name "strings.xml" -not -path "*/build/*"
