name: Build Custom Moshidon (Release)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "release.jks"
          encodedString: ${{ secrets.KEYSTORE_FILE }}

      - name: Feature & Brand Patch
        run: |
          # 1. 解锁 12 张图片限制
          TARGET_FILE="mastodon/src/main/java/org/joinmastodon/android/ui/viewcontrollers/ComposeMediaViewController.java"
          sed -i 's/MAX_ATTACHMENTS = 4/MAX_ATTACHMENTS = 12/g' $TARGET_FILE
          sed -i 's/MAX_ATTACHMENTS=4/MAX_ATTACHMENTS=12/g' $TARGET_FILE
          
          # 2. 修改应用显示名称 (使用通用后缀)
          STRINGS_FILE="mastodon/src/main/res/values/strings.xml"
          sed -i 's/>Moshidon</>Moshidon-Custom</g' $STRINGS_FILE
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :mastodon:assembleRelease --no-daemon

      - name: Locate and Sign APK
        run: |
          echo "--- Scanning for APK files ---"
          find . -name "*.apk"
          
          # 自动捕获 Release APK
          UNSIGNED_APK=$(find . -path "*/build/outputs/apk/*" -name "*.apk" | grep -i "release" | grep -v "signed" | head -n 1)
          
          if [ -z "$UNSIGNED_APK" ]; then
            echo "Error: No Release APK found!"
            exit 1
          fi
          
          SIGNED_APK="Moshidon-Custom-Signed.apk"
          
          # 使用 Secrets 中的变量进行签名，证书别名建议您在生成时也使用通用名称
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks ${{ steps.android_keystore.outputs.filePath }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias qx-alias \
            --out $SIGNED_APK "$UNSIGNED_APK"
          
          echo "Success: APK signed and ready."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Moshidon-Custom-Release
          path: "Moshidon-Custom-Signed.apk"
