name: Build and Release MoshidonQX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "release.jks"
          encodedString: ${{ secrets.KEYSTORE_FILE }}

      - name: MoshidonQX Brand & Feature Patch
        run: |
          # 1. 解锁 12 张图片限制
          TARGET_FILE="mastodon/src/main/java/org/joinmastodon/android/ui/viewcontrollers/ComposeMediaViewController.java"
          sed -i 's/MAX_ATTACHMENTS = 4/MAX_ATTACHMENTS = 12/g' $TARGET_FILE
          sed -i 's/MAX_ATTACHMENTS=4/MAX_ATTACHMENTS=12/g' $TARGET_FILE
          
          # 2. 全量更名逻辑：将所有 strings.xml 里的 app_name 改为 MoshidonQX
          find . -name "strings.xml" -exec sed -i 's/name="app_name">[^<]*/name="app_name">MoshidonQX/g' {} +
          
          # 3. 修改 AndroidManifest.xml 里的标签
          find . -name "AndroidManifest.xml" -exec sed -i 's/android:label="Moshidon"/android:label="MoshidonQX"/g' {} +

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :mastodon:assembleRelease --no-daemon

      - name: Locate and Sign APK
        run: |
          # 搜索生成的 Release APK
          UNSIGNED_APK=$(find . -path "*/build/outputs/apk/*" -name "*.apk" | grep -i "release" | grep -v "\-Signed.apk" | head -n 1)
          if [ -z "$UNSIGNED_APK" ]; then echo "Error: No APK found!"; exit 1; fi
          
          SIGNED_APK="MoshidonQX-Signed.apk"
          
          # 使用你存好的脱敏密钥进行签名
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks ${{ steps.android_keystore.outputs.filePath }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias custom-alias \
            --out $SIGNED_APK "$UNSIGNED_APK"
          echo "Success: MoshidonQX signed."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MoshidonQX Release v1.0.${{ github.run_number }}
          body: |
            ## MoshidonQX (Classic Edition)
            - 解锁 12 张图片上传限制
            - 品牌更名为 MoshidonQX
            - 自动签名正式版
          files: |
            MoshidonQX-Signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
