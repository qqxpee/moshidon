name: Build and Release MoshidonQX (Secret Driven)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "release.jks"
          encodedString: ${{ secrets.KEYSTORE_FILE }}

      - name: MoshidonQX Brand & Feature Patch
        run: |
          # 1. 核心破解：12 张图片限制
          TARGET_JAVA="mastodon/src/main/java/org/joinmastodon/android/ui/viewcontrollers/ComposeMediaViewController.java"
          sed -i 's/MAX_ATTACHMENTS = 4/MAX_ATTACHMENTS = 12/g' $TARGET_JAVA
          sed -i 's/MAX_ATTACHMENTS=4/MAX_ATTACHMENTS=12/g' $TARGET_JAVA
          
          # 2. 从 Secrets 读取应用名称并精准替换
          # 变量名变为 ${{ secrets.CUSTOM_APP_NAME }}
          TARGET_XML="mastodon/src/main/res/values/strings_mo.xml"
          
          sed -i "s/>Moshidon</>${{ secrets.CUSTOM_APP_NAME }}</g" $TARGET_XML
          sed -i "s/>Moshidon Debug</>${{ secrets.CUSTOM_APP_NAME }}</g" $TARGET_XML
          sed -i "s/>Moshidon Nightly</>${{ secrets.CUSTOM_APP_NAME }}</g" $TARGET_XML
          
          # 3. 清单文件硬编码同步
          find . -name "AndroidManifest.xml" -exec sed -i "s/android:label=\"@string\/mo_app_name\"/android:label=\"${{ secrets.CUSTOM_APP_NAME }}\"/g" {} +
          
          echo "Patch applied using secret: ${{ secrets.CUSTOM_APP_NAME }}"
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :mastodon:assembleRelease --no-daemon

      - name: Locate and Sign APK
        run: |
          UNSIGNED_APK=$(find . -path "*/build/outputs/apk/*" -name "*.apk" | grep -i "release" | grep -v "\-Signed.apk" | head -n 1)
          if [ -z "$UNSIGNED_APK" ]; then echo "Error: No APK found!"; exit 1; fi
          
          # 签名后的文件名也从 Secret 读取
          SIGNED_APK="${{ secrets.CUSTOM_APP_NAME }}-Signed.apk"
          
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks ${{ steps.android_keystore.outputs.filePath }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias custom-alias \
            --out "$SIGNED_APK" "$UNSIGNED_APK"
          echo "Success: $SIGNED_APK generated."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "${{ secrets.CUSTOM_APP_NAME }} Release v1.0.${{ github.run_number }}"
          body: |
            ## ${{ secrets.CUSTOM_APP_NAME }} 自动构建
            - **密钥配置**：应用名称完全由 Repository Secret 控制
            - **破解项**：12 张媒体图片限制已解除
          files: |
            ${{ secrets.CUSTOM_APP_NAME }}-Signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
