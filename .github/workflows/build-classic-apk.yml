name: Build MoshidonQX (Professional Release)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "release.jks"
          encodedString: ${{ secrets.KEYSTORE_FILE }}

      - name: MoshidonQX Identity Patch
        run: |
          # 1. 破解 12 张图片限制
          TARGET_FILE="mastodon/src/main/java/org/joinmastodon/android/ui/viewcontrollers/ComposeMediaViewController.java"
          sed -i 's/MAX_ATTACHMENTS = 4/MAX_ATTACHMENTS = 12/g' $TARGET_FILE
          sed -i 's/MAX_ATTACHMENTS=4/MAX_ATTACHMENTS=12/g' $TARGET_FILE
          
          # 2. 品牌更名
          STRINGS_FILE="mastodon/src/main/res/values/strings.xml"
          sed -i 's/>Moshidon</>MoshidonQX</g' $STRINGS_FILE
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :mastodon:assembleRelease --no-daemon

      - name: Sign APK (MoshidonQX Aggressive Search)
        run: |
          # 改用递归搜索，只要是 release 目录下的 apk 统统不放过
          # 同时排除掉已经带 signed 字样的文件
          UNSIGNED_APK=$(find mastodon/build/outputs/apk -name "*.apk" | grep -i "release" | grep -v "signed" | head -n 1)
          
          if [ -z "$UNSIGNED_APK" ]; then
            echo "错误：在构建目录中没找到任何 APK 文件！"
            exit 1
          fi
          
          echo "捕获到待签名文件: $UNSIGNED_APK"
          SIGNED_APK="MoshidonQX-Final-Signed.apk"
          
          # 增加 --ks-key-alias 确保匹配我们生成的 qx-alias
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks ${{ steps.android_keystore.outputs.filePath }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias qx-alias \
            --out $SIGNED_APK "$UNSIGNED_APK"
          
          echo "Success: MoshidonQX is now officially signed and ready."

      - name: Upload MoshidonQX APK
        uses: actions/upload-artifact@v4
        with:
          name: MoshidonQX-Release-Package
          path: "MoshidonQX-Final-Signed.apk"
